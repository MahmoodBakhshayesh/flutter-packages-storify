name: storify
description: >
  Storify — Instagram-like stories for Flutter: scrollable tray, full-screen
  viewer, RTL support, theming, transitions, and cached video slides.
version: 0.3.0
homepage: https://github.com/MahmoodBakhshayesh/flutter-packages-storify
repository: https://github.com/MahmoodBakhshayesh/flutter-packages-storify
issue_tracker: https://github.com/MahmoodBakhshayesh/flutter-packages-storify/issues
documentation: https://github.com/MahmoodBakhshayesh/flutter-packages-storify#readme
license: MIT


environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cached_video_player_plus: ^4.1.0
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

platforms:
  android:
  ios:
  web:
  windows:
  macos:
  linux:

flutter:
